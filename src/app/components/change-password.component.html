<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="surface p-4">
      <h3 class="fw-bold mb-3">Change Password</h3>
      <div class="mb-3">
        <label class="form-label">Current Password</label>
        <input class="form-control" [(ngModel)]="currentPassword" type="password" />
      </div>
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input class="form-control" [(ngModel)]="newPassword" type="password" />
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm New Password</label>
        <input class="form-control" [(ngModel)]="confirmPassword" type="password" />
      </div>
      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }
      @if (message()) {
        <div class="alert alert-success">{{ message() }}</div>
      }
      <button class="btn btn-brand w-100" type="button" (click)="submit()">Update Password</button>
      <p class="text-muted mt-3"><a routerLink="/">Back to home</a></p>
    </div>
  </div>
</div>
