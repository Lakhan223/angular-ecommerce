<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="surface p-4">
      <h3 class="fw-bold mb-3">Reset Password</h3>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" [(ngModel)]="email" type="email" />
      </div>
      @if (!hasToken()) {
        <div class="alert alert-warning">
          Reset link is invalid or expired. Please request a new link.
        </div>
      }
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input class="form-control" [(ngModel)]="newPassword" type="password" />
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input class="form-control" [(ngModel)]="confirmPassword" type="password" />
      </div>
      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }
      @if (message()) {
        <div class="alert alert-success">{{ message() }}</div>
      }
      <button class="btn btn-brand w-100" type="button" (click)="submit()" [disabled]="!hasToken()">Reset Password</button>
      <p class="text-muted mt-3"><a routerLink="/login">Back to login</a></p>
    </div>
  </div>
</div>
