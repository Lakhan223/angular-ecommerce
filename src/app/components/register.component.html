<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="surface p-4">
      <h3 class="fw-bold mb-3">Create Account</h3>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">First name</label>
          <input class="form-control" [(ngModel)]="firstName" />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Last name</label>
          <input class="form-control" [(ngModel)]="lastName" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" [(ngModel)]="email" type="email" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" [(ngModel)]="password" type="password" />
      </div>
      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }
      <button class="btn btn-brand w-100" (click)="register()">Register</button>
      <p class="text-muted mt-3">Already have an account? <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
