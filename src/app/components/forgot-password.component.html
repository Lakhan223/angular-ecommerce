<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="surface p-4">
      <h3 class="fw-bold mb-3">Forgot Password</h3>
      <p class="text-muted">Enter your email and we’ll send you a reset link.</p>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" [(ngModel)]="email" type="email" />
      </div>
      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }
      @if (message()) {
        <div class="alert alert-success">{{ message() }}</div>
      }
      <button class="btn btn-brand w-100" type="button" (click)="submit()">Send Reset Token</button>
      <p class="text-muted mt-3">Check your email for the reset link.</p>
      <p class="text-muted mt-3"><a routerLink="/login">Back to login</a></p>
    </div>
  </div>
</div>
