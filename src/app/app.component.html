<div class="app-shell">
  <nav class="navbar navbar-expand-lg px-3 py-3">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" routerLink="/">ECommercePro</a>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary" (click)="toggleTheme()">
          {{ darkMode() ? 'Light' : 'Dark' }} Mode
        </button>
        <a class="btn btn-sm btn-outline-secondary" routerLink="/wishlist">Wishlist ({{ wishlistCount() }})</a>
        <a class="btn btn-sm btn-brand" routerLink="/cart">Cart ({{ cartCount() }})</a>
        @if (isAuthenticated()) {
          <span class="text-muted">{{ userEmail() }}</span>
          <a class="btn btn-sm btn-outline-primary" routerLink="/orders">Orders</a>
          <a class="btn btn-sm btn-outline-secondary" routerLink="/change-password">Change Password</a>
          @if (userRole() === 'Admin' || userRole() === 'admin') {
            <a class="btn btn-sm btn-outline-dark" routerLink="/admin">Admin</a>
          }
          <button class="btn btn-sm btn-outline-danger" (click)="logout()">Logout</button>
        } @else {
          <a class="btn btn-sm btn-outline-primary" routerLink="/login">Login</a>
          <a class="btn btn-sm btn-outline-secondary" routerLink="/register">Register</a>
        }
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    <router-outlet></router-outlet>
  </main>
</div>
